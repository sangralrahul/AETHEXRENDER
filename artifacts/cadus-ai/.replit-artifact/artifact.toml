kind = "web"
previewPath = "/cadus-ai/"
title = "Cadus AI"
version = "1.0.0"
id = "artifacts/cadus-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cadus-ai/" ]
localPort = 22530

[services.development]
run = "pnpm --filter @workspace/cadus-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cadus-ai", "run", "build" ]
publicDir = "artifacts/cadus-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22530"
BASE_PATH = "/cadus-ai/"
