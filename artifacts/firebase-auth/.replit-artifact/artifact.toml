kind = "web"
previewPath = "/firebase-auth/"
title = "Firebase Auth"
version = "1.0.0"
id = "artifacts/firebase-auth"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/firebase-auth/" ]
localPort = 22696

[services.development]
run = "pnpm --filter @workspace/firebase-auth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/firebase-auth", "run", "build" ]
publicDir = "artifacts/firebase-auth/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22696"
BASE_PATH = "/firebase-auth/"
